build-windows:
    name: Build Windows (DLL + LIB)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install libsodium via vcpkg
        run: |
          vcpkg install libsodium:x64-windows
          # 关键步骤：自动导出 vcpkg 的工具链变量，让后续的 cl.exe 能找到库
          vcpkg integrate install

      - name: Build Dynamic Library (.dll)
        run: |
          mkdir -p build
          # 使用 vcpkg integrate 后，通常不需要手动指定 /LIBPATH
          cl.exe /LD /EHsc /I "./include" src/libsodium_crypto.c /Fe:build/libsodium_crypto.dll /link sodium.lib

      - name: Build Static Library (.lib)
        run: |
          mkdir -p build
          cl.exe /c /EHsc /I "./include" src/libsodium_crypto.c
          lib.exe /OUT:build/libsodium_crypto.lib libsodium_crypto.obj

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-libs
          path: |
            build/*.dll
            build/*.lib

name: Build Windows (DLL + LIB)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone and setup vcpkg
        run: |
          if not exist vcpkg (
            git clone https://github.com/microsoft/vcpkg.git
          )
          cd vcpkg
          bootstrap-vcpkg.bat
          cd ..

      - name: Install libsodium (Static)
        run: |
          vcpkg\vcpkg.exe install libsodium:x64-windows-static

      - name: Verify installation
        run: |
          echo Checking sodium.h...
          dir vcpkg\installed\x64-windows-static\include\sodium.h
          echo Checking sodium.lib...
          dir vcpkg\installed\x64-windows-static\lib\sodium.lib

      - name: Build DLL
        run: |
          mkdir build
          cl.exe /LD /MT ^
            /I".\include" ^
            /I".\vcpkg\installed\x64-windows-static\include" ^
            src\libsodium_crypto.c ^
            /Fe:build\libsodium_crypto.dll ^
            /link ^
            /LIBPATH:.\vcpkg\installed\x64-windows-static\lib ^
            sodium.lib

      - name: Build Static LIB
        run: |
          cl.exe /c /MT ^
            /I".\include" ^
            /I".\vcpkg\installed\x64-windows-static\include" ^
            src\libsodium_crypto.c
          lib.exe /OUT:build\libsodium_crypto.lib libsodium_crypto.obj

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-libs
          path: |
            build/libsodium_crypto.dll
            build/libsodium_crypto.lib

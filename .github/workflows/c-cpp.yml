name: Build Windows (MinGW64)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MSYS2 and libsodium
        shell: powershell
        run: |
          # 1. 下载并安装 MSYS2 (官方标准方式)
          Write-Host "Downloading MSYS2..."
          Invoke-WebRequest -Uri 'https://repo.msys2.org/distrib/x86_64/msys2-base-x86_64-20240113.tar.xz' -OutFile 'msys2.tar.xz'
          
          Write-Host "Extracting MSYS2..."
          7z x msys2.tar.xz -so | 7z x -si -ttar -oC:\
          
          # 2. 更新 MSYS2 并安装 MinGW 和 libsodium
          Write-Host "Installing MinGW64 and libsodium..."
          C:\msys64\usr\bin\bash.exe -lc "pacman -Syu --noconfirm"
          C:\msys64\usr\bin\bash.exe -lc "pacman -S mingw-w64-x86_64-gcc mingw-w64-x86_64-libsodium --noconfirm"
          
          # 3. 将 MinGW 添加到系统 PATH
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify installation
        shell: powershell
        run: |
          Write-Host "Checking gcc version..."
          gcc --version
          Write-Host "Checking libsodium..."
          dir C:\msys64\mingw64\include\sodium.h
          dir C:\msys64\mingw64\lib\libsodium.a

      - name: Build DLL and Static Library
        shell: powershell
        run: |
          # 创建输出目录
          if (!(Test-Path build)) { New-Item -ItemType Directory -Path build }
          
          Write-Host "Building DLL..."
          gcc -shared -o build/libsodium_crypto.dll src/libsodium_crypto.c -lsodium
          
          Write-Host "Building Static Library (.a)..."
          gcc -c -o build/libsodium_crypto.o src/libsodium_crypto.c
          ar rcs build/libsodium_crypto.lib build/libsodium_crypto.o

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-mingw-libs
          path: |
            build/libsodium_crypto.dll
            build/libsodium_crypto.lib

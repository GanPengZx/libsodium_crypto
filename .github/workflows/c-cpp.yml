name: Build Cross-Platform Libraries

# 允许手动触发
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows (DLL + LIB)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 关键：使用专门的 Action 初始化 MSVC 环境
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install libsodium via vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install libsodium:x64-windows

      - name: Build Static Library (.lib)
        run: |
          mkdir build
          cl.exe /c /MT /I"./include" /I"./vcpkg/installed/x64-windows/include" src\libsodium_crypto.c
          lib.exe /OUT:build\libsodium_crypto.lib libsodium_crypto.obj

      - name: Build Dynamic Library (.dll)
        run: |
          cl.exe /LD /MT /I"./include" /I"./vcpkg/installed/x64-windows/include" src\libsodium_crypto.c /link /LIBPATH:.\vcpkg\installed\x64-windows\lib sodium.lib /OUT:build\libsodium_crypto.dll

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-libs
          path: |
            build/*.lib
            build/*.dll

  build-linux:
    name: Build Linux (SO + A)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev

      - name: Build Libraries
        run: |
          mkdir -p build
          gcc -fPIC -shared -I./include src/libsodium_crypto.c -o build/libsodium_crypto.so -lsodium -static-libgcc -static-libstdc++
          gcc -c -I./include src/libsodium_crypto.c -o build/libsodium_crypto.o
          ar rcs build/libsodium_crypto.a build/libsodium_crypto.o

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-libs
          path: |
            build/*.so
            build/*.a

  build-macos:
    name: Build macOS (DYLIB + A)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install libsodium

      - name: Build Libraries
        run: |
          mkdir -p build
          clang -dynamiclib -I./include src/libsodium_crypto.c -o build/libsodium_crypto.dylib -lsodium
          clang -c -I./include src/libsodium_crypto.c -o build/libsodium_crypto.o
          ar rcs build/libsodium_crypto.a build/libsodium_crypto.o

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-libs
          path: |
            build/*.dylib
            build/*.a

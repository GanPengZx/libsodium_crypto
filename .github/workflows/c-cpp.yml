name: Build and Release Libraries

on:
  push:
    tags:
      - 'v*'  # 当推送 v1.0.0 这样的标签时触发
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup vcpkg
        # 修复点1：使用正确的社区 Action
        uses: lunaticsoftware/vcpkg-action@main
        with:
          vcpkg-path: '${{ github.workspace }}/vcpkg'

      - name: Compile Windows Libraries (MSVC)
        shell: cmd
        run: |
          mkdir build
          :: 设置 Include 路径指向 vcpkg 安装的 include 文件夹
          set INCLUDE=${{ github.workspace }}\vcpkg\installed\x64-windows\include;%INCLUDE%
          set LIB=${{ github.workspace }}\vcpkg\installed\x64-windows\lib;%LIB%
          
          echo Compiling DLL...
          cl.exe /LD /I"./src" src\libsodium_crypto.c /Fe"build\libsodium_crypto.dll" /link sodium.lib
          
          echo Compiling Static LIB...
          lib.exe /OUT:build\libsodium_crypto.lib src\libsodium_crypto.obj

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-libs
          path: |
            build/libsodium_crypto.dll
            build/libsodium_crypto.lib

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # 修复点2：确保安装 dev 包以获取头文件
          sudo apt-get install -y libsodium-dev

      - name: Compile Linux Libraries (GCC)
        run: |
          mkdir -p build
          gcc -fPIC -shared \
              -I./src \
              ./src/libsodium_crypto.c \
              -o build/libsodium_crypto.so \
              -lsodium

          # 编译静态库
          gcc -c -I./src ./src/libsodium_crypto.c -o build/libsodium_crypto.o
          ar rcs build/libsodium_crypto.a build/libsodium_crypto.o

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-libs
          path: |
            build/libsodium_crypto.so
            build/libsodium_crypto.a

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          # 确保安装 libsodium
          brew install libsodium

      - name: Compile macOS Libraries (Clang)
        run: |
          mkdir -p build
          
          # 修复点3：使用 SODIUM_ROOT_DIR 或 Homebrew 默认路径
          # Homebrew 默认路径通常是 /opt/homebrew 或 /usr/local
          clang -dynamiclib \
                -I./src \
                ./src/libsodium_crypto.c \
                -o build/libsodium_crypto.dylib \
                -lsodium \
                -L/usr/local/lib \
                -I/usr/local/include

          # 编译静态库
          clang -c -I./src ./src/libsodium_crypto.c -o build/libsodium_crypto.o
          ar rcs build/libsodium_crypto.a build/libsodium_crypto.o

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-libs
          path: |
            build/libsodium_crypto.dylib
            build/libsodium_crypto.a

  create-release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create ZIP archives
        run: |
          cd dist
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
          generate_release_notes: true

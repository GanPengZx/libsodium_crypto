name: Build Windows (MinGW64)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install libsodium and GCC via MSYS2
        shell: powershell
        run: |
          Write-Host "Updating MSYS2 packages..."
          C:\msys64\usr\bin\pacman.exe -Syu --noconfirm
          
          Write-Host "Installing GCC and libsodium..."
          C:\msys64\usr\bin\pacman.exe -S mingw-w64-x86_64-gcc mingw-w64-x86_64-libsodium --noconfirm

      - name: Verify Environment
        shell: powershell
        run: |
          Write-Host "GCC Version:"
          C:\msys64\mingw64\bin\gcc.exe --version
          Write-Host "Checking libsodium headers:"
          dir C:\msys64\mingw64\include\sodium.h

      - name: Build DLL and Static Library
        shell: powershell
        run: |
          # Create build directory
          if (!(Test-Path build)) { New-Item -ItemType Directory -Path build }
          
          Write-Host "Building DLL..."
          C:\msys64\mingw64\bin\x86_64-w64-mingw32-gcc.exe -shared `
            -o build/libsodium_crypto.dll `
            src/libsodium_crypto.c `
            -lsodium
          
          Write-Host "Building Static Library (.a)..."
          C:\msys64\mingw64\bin\x86_64-w64-mingw32-gcc.exe -c `
            -o build/libsodium_crypto.o `
            src/libsodium_crypto.c
          
          C:\msys64\mingw64\bin\ar.exe rcs `
            build/libsodium_crypto.lib `
            build/libsodium_crypto.o

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-mingw-libs
          path: |
            build/libsodium_crypto.dll
            build/libsodium_crypto.lib

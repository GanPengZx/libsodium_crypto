name: Build and Release Libraries

on:
  push:
    tags:
      - 'v*' # 当推送 v1.0.0 这样的标签时触发
  workflow_dispatch: # 允许手动触发

jobs:
  build-windows:
    name: Build Windows (DLL + LIB)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install libsodium:x64-windows

      - name: Compile with MSVC (Static Lib)
        run: |
          mkdir build
          cl.exe /c /I"./src" /I"${{ github.workspace }}\vcpkg\installed\x64-windows\include" src\libsodium_crypto.c /Fo build\libsodium_crypto.obj
          lib.exe /OUT:build\libsodium_crypto.lib build\libsodium_crypto.obj "${{ github.workspace }}\vcpkg\installed\x64-windows\lib\sodium.lib"
        shell: cmd

      - name: Compile with MinGW (Static .a)
        run: |
          mkdir build-mingw
          g++ -c -I"./src" -I"C:\msys64\mingw64\include" src\libsodium_crypto.c -o build-mingw\libsodium_crypto.o
          ar rcs build-mingw\libsodium_crypto.a build-mingw\libsodium_crypto.o
        shell: cmd

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-libs
          path: |
            build/libsodium_crypto.lib
            build-mingw/libsodium_crypto.a

  build-linux:
    name: Build Linux (SO + A)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev pkg-config

      - name: Compile Libraries (GCC)
        run: |
          mkdir -p build
          
          # 静态编译 .a (推荐)
          gcc -c -fPIC -I./src src/libsodium_crypto.c -o build/libsodium_crypto_static.o
          ar rcs build/libsodium_crypto.a build/libsodium_crypto_static.o
          
          # 动态编译 .so
          gcc -shared -fPIC -I./src src/libsodium_crypto.c -o build/libsodium_crypto.so -lsodium

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-libs
          path: |
            build/libsodium_crypto.so
            build/libsodium_crypto.a

  build-macos:
    name: Build macOS (DYLIB + A)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install libsodium

      - name: Compile Libraries (Clang)
        run: |
          mkdir -p build
          
          # 静态编译 .a
          clang -c -I./src src/libsodium_crypto.c -o build/libsodium_crypto_static.o
          ar rcs build/libsodium_crypto.a build/libsodium_crypto_static.o
          
          # 动态编译 .dylib
          clang -dynamiclib -I./src src/libsodium_crypto.c -o build/libsodium_crypto.dylib -lsodium

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-libs
          path: |
            build/libsodium_crypto.dylib
            build/libsodium_crypto.a

  create-release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create ZIP archives
        run: |
          cd dist
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
          generate_release_notes: true

name: Build Cross-Platform Libraries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows (DLL + LIB)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: microsoft/setup-vcpkg@v2
        with:
          vcpkgCommitId: '2024.06.15'

      - name: Install libsodium via vcpkg
        run: |
          vcpkg install libsodium:x64-windows

      - name: Compile with MSVC
        run: |
          mkdir build
          cl.exe /LD `
            /I"./include" `
            /I"${{ github.workspace }}/vcpkg/installed/x64-windows/include" `
            ./src/libsodium_crypto.c `
            /Fe:build/libsodium_crypto.dll `
            /link `
            /LIBPATH:"${{ github.workspace }}/vcpkg/installed/x64-windows/lib" `
            sodium.lib `
            ws2_32.lib `
            advapi32.lib `
            bcrypt.lib

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-libs
          path: |
            build/libsodium_crypto.dll
            build/libsodium_crypto.lib

  build-linux:
    name: Build Linux (SO + A)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev

      - name: Compile Shared Object
        run: |
          mkdir build
          gcc -fPIC -shared \
            -I./include \
            ./src/libsodium_crypto.c \
            -o build/libsodium_crypto.so \
            -lsodium \
            -O2 \
            -std=c99

      - name: Compile Static Library
        run: |
          gcc -c -I./include ./src/libsodium_crypto.c -o build/libsodium_crypto.o -O2 -std=c99
          ar rcs build/libsodium_crypto.a build/libsodium_crypto.o

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-libs
          path: |
            build/libsodium_crypto.so
            build/libsodium_crypto.a

  build-macos:
    name: Build macOS (DYLIB + A)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install libsodium

      - name: Compile Dynamic Library
        run: |
          mkdir build
          clang -dynamiclib \
            -I./include \
            ./src/libsodium_crypto.c \
            -o build/libsodium_crypto.dylib \
            -lsodium \
            -O2 \
            -std=c99

      - name: Compile Static Library
        run: |
          clang -c -I./include ./src/libsodium_crypto.c -o build/libsodium_crypto.o -O2 -std=c99
          ar rcs build/libsodium_crypto.a build/libsodium_crypto.o

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-libs
          path: |
            build/libsodium_crypto.dylib
            build/libsodium_crypto.a

  create-release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create ZIP archives
        run: |
          cd dist
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
          generate_release_notes: true

name: Build Windows (MinGW64)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 and Install Dependencies
        run: |
          Write-Host "Updating MSYS2..."
          C:\msys64\usr\bin\pacman.exe -Syu --noconfirm
          
          Write-Host "Installing GCC and libsodium..."
          C:\msys64\usr\bin\pacman.exe -S mingw-w64-x86_64-gcc mingw-w64-x86_64-libsodium --noconfirm
          
          Write-Host "Adding MinGW to PATH..."
          $env:PATH = "C:\msys64\mingw64\bin;" + $env:PATH

      - name: Build DLL and Static Library
        working-directory: ./
        run: |
          if (!(Test-Path build)) { New-Item -ItemType Directory -Path build }
          
          Write-Host "Building DLL..."
          x86_64-w64-mingw32-gcc.exe -shared -o libsodium_crypto.dll src/libsodium_crypto.c -Iinclude -O2 -std=c99

          Write-Host "Building Static Library (.a)..."
          x86_64-w64-mingw32-gcc.exe -c -o build/libsodium_crypto.o libsodium_crypto.c
          
          x86_64-w64-mingw32-ar.exe rcs build/libsodium_crypto.lib build/libsodium_crypto.o

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-mingw-libs
          path: |
            src/build/libsodium_crypto.dll
            src/build/libsodium_crypto.lib

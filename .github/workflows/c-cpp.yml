name: Build Cross-Platform Libraries

# 允许手动触发
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows (DLL + LIB)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: cmd   # ← 用 cmd 最稳，避免 PowerShell 转义把路径搞炸

    steps:
      - uses: actions/checkout@v4

      # 1) 装 vcpkg + libsodium（静态三元组，最符合你说的“静态编译”）
      - name: Install libsodium (vcpkg static x64)
        run: |
          IF NOT EXIST vcpkg (
            git clone https://github.com/microsoft/vcpkg.git
          )
          cd vcpkg
          bootstrap-vcpkg.bat
          vcpkg.exe install libsodium:x64-windows-static
          vcpkg.exe integrate install
          cd ..

      # 2) 验证：打印 sodium.h / sodium.lib 是否真的存在（你不瞎猜）
      - name: DEBUG show vcpkg layout
        run: |
          echo %GITHUB_WORKSPACE%
          dir /s /b "%GITHUB_WORKSPACE%\vcpkg\installed\x64-windows-static\include\sodium.h" || echo "!!! sodium.h NOT FOUND !!!"
          dir /s /b "%GITHUB_WORKSPACE%\vcpkg\installed\x64-windows-static\lib\sodium.lib" || echo "!!! sodium.lib NOT FOUND !!!"

      # 3) 初始化 MSVC 环境（x64）
      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 4) 编译：DLL + 静态 LIB（/MT = 静态 CRT，更接近你“静态编译”目标）
      - name: Build
        run: |
          set "ROOT=%GITHUB_WORKSPACE%"
          set "VCPKG=%ROOT%\vcpkg"
          set "INC=/I"%ROOT%\include" /I"%VCPKG%\installed\x64-windows-static\include""
          set "LIBPATH=/LIBPATH:"%VCPKG%\installed\x64-windows-static\lib""

          if not exist build mkdir build

          echo ----- build DLL -----
          cl.exe /LD /MT %INC% ^
            "%ROOT%\src\libsodium_crypto.c" ^
            /Fe:"%ROOT%\build\libsodium_crypto.dll" ^
            /link %LIBPATH% sodium.lib

          echo ----- build STATIC .lib -----
          cl.exe /c /MT %INC% ^
            "%ROOT%\src\libsodium_crypto.c" ^
            /Fo:"%ROOT%\build\libsodium_crypto.obj"
          lib.exe /OUT:"%ROOT%\build\libsodium_crypto.lib" "%ROOT%\build\libsodium_crypto.obj"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-libs
          path: |
            build/libsodium_crypto.dll
            build/libsodium_crypto.lib

  build-linux:
    name: Build Linux (SO + A)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev

      - name: Build Libraries
        run: |
          mkdir -p build
          gcc -fPIC -shared -I./include src/libsodium_crypto.c -o build/libsodium_crypto.so -lsodium -static-libgcc -static-libstdc++
          gcc -c -I./include src/libsodium_crypto.c -o build/libsodium_crypto.o
          ar rcs build/libsodium_crypto.a build/libsodium_crypto.o

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-libs
          path: |
            build/*.so
            build/*.a

  build-macos:
    name: Build macOS (DYLIB + A)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install libsodium

      - name: Build Libraries
        run: |
          mkdir -p build
          clang -dynamiclib -I./include src/libsodium_crypto.c -o build/libsodium_crypto.dylib -lsodium
          clang -c -I./include src/libsodium_crypto.c -o build/libsodium_crypto.o
          ar rcs build/libsodium_crypto.a build/libsodium_crypto.o

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-libs
          path: |
            build/*.dylib
            build/*.a

name: Build and Release Libraries

on:
  push:
    tags:
      - 'v*' # 当推送 v1.0.0 这样的标签时触发
  workflow_dispatch: # 允许手动触发

jobs:
  build-windows:
    name: Build Windows (DLL + LIB)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install libsodium:x64-windows

      - name: Compile DLL (Static Runtime)
        run: |
          mkdir build
          # /MT: 使用静态链接的C运行时库
          cl.exe /LD /MT /I"./src" `
                "src\libsodium_crypto.c" `
                /Fe"build\libsodium_crypto_dll.lib" `
                /link /LIBPATH:"${{ github.workspace }}\vcpkg\installed\x64-windows\lib" `
                sodium.lib
          # 复制DLL
          copy "${{ github.workspace }}\vcpkg\installed\x64-windows\bin\sodium.dll" build\
          
      - name: Compile Static LIB (Static Runtime)
        run: |
          mkdir build
          # /MT: 静态链接运行时
          # /c: 只编译不链接
          cl.exe /c /MT /I"./src" "src\libsodium_crypto.c" /Fo"build\libsodium_crypto_static.obj"
          # lib.exe 生成 .lib 文件
          lib.exe /OUT:build\libsodium_crypto_static.lib build\libsodium_crypto_static.obj

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-libs
          path: |
            build/*.lib
            build/*.dll

  build-linux:
    name: Build Linux (SO + A)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev

      - name: Compile Libraries
        run: |
          mkdir -p build
          
          # 1. 编译动态库 (.so) 并静态链接内部依赖
          gcc -fPIC -shared \
              -I./src \
              ./src/libsodium_crypto.c \
              -o build/libsodium_crypto.so \
              -lsodium \
              -static-libgcc -static-libstdc++

          # 2. 编译静态库 (.a)
          gcc -c -I./src ./src/libsodium_crypto.c -o build/libsodium_crypto.o
          ar rcs build/libsodium_crypto.a build/libsodium_crypto.o

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-libs
          path: |
            build/libsodium_crypto.so
            build/libsodium_crypto.a

  build-macos:
    name: Build macOS (DYLIB + A)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install libsodium

      - name: Compile Libraries
        run: |
          mkdir -p build
          
          # 1. 编译动态库 (.dylib)
          clang -dynamiclib \
                -I./src \
                ./src/libsodium_crypto.c \
                -o build/libsodium_crypto.dylib \
                -lsodium \
                -static

          # 2. 编译静态库 (.a)
          clang -c -I./src ./src/libsodium_crypto.c -o build/libsodium_crypto.o
          ar rcs build/libsodium_crypto.a build/libsodium_crypto.o

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-libs
          path: |
            build/libsodium_crypto.dylib
            build/libsodium_crypto.a

  create-release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create ZIP archives
        run: |
          cd dist
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
          generate_release_notes: true

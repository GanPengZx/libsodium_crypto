name: Build Linux (GCC)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev

      - name: Build Shared Library (.so)
        run: |
          mkdir -p build
          gcc -shared -o build/libsodium_crypto.so \
            src/libsodium_crypto.c \
            -Iinclude \
            -O2 \
            -std=c99 \
            -lsodium \
            -fPIC

      - name: Build Static Library (.a)
        run: |
          mkdir -p build
          gcc -c -o build/libsodium_crypto.o \
            src/libsodium_crypto.c \
            -Iinclude \
            -O2 \
            -std=c99 \
            -fPIC
          
          ar rcs build/libsodium_crypto.a build/libsodium_crypto.o

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-libs
          path: |
            build/libsodium_crypto.so
            build/libsodium_crypto.a

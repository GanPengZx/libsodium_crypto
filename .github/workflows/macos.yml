name: Build macOS (Universal)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # 更新 Homebrew 并安装 libsodium
          brew update
          brew install libsodium

      - name: Build Dynamic Library (.dylib)
        run: |
          mkdir -p build
          # 使用 clang 编译动态库
          # -dynamiclib: 生成 macOS 动态库
          # $(brew --prefix libsodium): 自动获取 Homebrew 的安装路径（解决路径问题）
          clang -dynamiclib -o build/libsodium_crypto.dylib \
            src/libsodium_crypto.c \
            -Iinclude \
            -I$(brew --prefix libsodium)/include \
            -L$(brew --prefix libsodium)/lib \
            -O2 \
            -std=c99 \
            -lsodium \
            -fPIC

      - name: Build Static Library (.a)
        run: |
          mkdir -p build
          # 编译目标文件
          clang -c -o build/libsodium_crypto.o \
            src/libsodium_crypto.c \
            -Iinclude \
            -I$(brew --prefix libsodium)/include \
            -O2 \
            -std=c99 \
            -fPIC
          
          # 打包静态库
          ar rcs build/libsodium_crypto.a build/libsodium_crypto.o

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-libs
          path: |
            build/libsodium_crypto.dylib
            build/libsodium_crypto.a

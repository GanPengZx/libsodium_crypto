name: Build Windows (MinGW64)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 and Install Dependencies
        run: |
          Write-Host "Updating MSYS2..."
          C:\msys64\usr\bin\pacman.exe -Syu --noconfirm
          
          Write-Host "Installing GCC and libsodium..."
          # 确保安装了 binutils，它包含了 ar.exe
          C:\msys64\usr\bin\pacman.exe -S mingw-w64-x86_64-gcc mingw-w64-x86_64-libsodium mingw-w64-x86_64-binutils --noconfirm

      - name: Build DLL and Static Library
        run: |
          # 1. 创建 build 目录
          if (!(Test-Path build)) { New-Item -ItemType Directory -Path build }

          Write-Host "Building DLL..."
          # 编译 DLL
          & "C:/msys64/mingw64/bin/x86_64-w64-mingw32-gcc.exe" -shared `
            -o build/libsodium_crypto.dll `
            src/libsodium_crypto.c `
            -Iinclude `
            -O2 `
            -std=c99 `
            -lsodium

          Write-Host "Building Static Library..."
          # 编译 .o 对象文件
          & "C:/msys64/mingw64/bin/x86_64-w64-mingw32-gcc.exe" -c `
            -o build/libsodium_crypto.o `
            src/libsodium_crypto.c `
            -Iinclude `
            -O2 `
            -std=c99
            
          Write-Host "Archiving Static Library..."
          # 先删除旧的 .lib 文件，防止重命名冲突
          if (Test-Path build/libsodium_crypto.lib) {
            Remove-Item build/libsodium_crypto.lib -Force
          }
          
          # 🔥🔥 修正点在这里 🔥🔥
          # 文件名改为 ar.exe，与你截图里的文件名保持一致
          & "C:/msys64/mingw64/bin/ar.exe" rcs `
            build/libsodium_crypto.lib `
            build/libsodium_crypto.o

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-mingw-libs
          path: |
            build/libsodium_crypto.dll
            build/libsodium_crypto.lib
